stages:
  - build
  - test
  - deploy

build_job:
  stage: build
  script:
    - echo "Building the project..."
    - npm run dev  # Replace with your build commands
  only:
    - main

test_job:
  stage: test
  script:
    - echo "Running tests..."
    - npm test  # Replace with your test commands
  only:
    - main

deploy_job:
  stage: deploy
  script:
    - echo "Deploying to production..."
    - ./deploy.sh  # Replace with your deployment script
  only:
    - tags
